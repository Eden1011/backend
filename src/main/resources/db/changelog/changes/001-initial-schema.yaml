databaseChangeLog:
  - changeSet:
      id: 001-create-producers
      author: backend
      changes:
        - createTable:
            tableName: producers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 002-create-products
      author: backend
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_products_producer
                    references: producers(id)

  - changeSet:
      id: 003-create-attribute-types
      author: backend
      changes:
        - createTable:
            tableName: attribute_types
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 004-create-product-attribute-values
      author: backend
      changes:
        - createTable:
            tableName: product_attribute_values
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_pav_product
                    references: products(id)
              - column:
                  name: attribute_type_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_pav_attribute_type
                    references: attribute_types(id)
              - column:
                  name: value
                  type: VARCHAR(255)
